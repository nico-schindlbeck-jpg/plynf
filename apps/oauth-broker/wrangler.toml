name = "plynf-oauth-broker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom subdomain. Bind in Cloudflare zone settings:
#   oauth.plynf.com  →  this worker
routes = [
  { pattern = "oauth.plynf.com/*", custom_domain = true }
]

# Short-lived state storage (CSRF tokens, PKCE verifiers).
# 15-minute TTL — plenty for an interactive OAuth flow, automatic GC.
[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_AFTER_WRANGLER_KV_CREATE"

# Provider client IDs are public OAuth values — embedded in code is fine
# OAuth-spec-wise (it's just a registration identifier, not a secret).
# Client SECRETS, where required (Notion uses confidential clients),
# stay in Workers Secrets — set via:
#   wrangler secret put NOTION_CLIENT_SECRET
[vars]
GITHUB_CLIENT_ID = "REPLACE_WITH_REAL"
LINEAR_CLIENT_ID = "REPLACE_WITH_REAL"
NOTION_CLIENT_ID = "REPLACE_WITH_REAL"

# Brokered callback that providers will redirect to.
BROKER_CALLBACK_BASE = "https://oauth.plynf.com"

# Logs go to Cloudflare's tail — runtime-only, never to disk.
# Audit log writes the start/cb events (no tokens, no PII).
[observability]
enabled = true
