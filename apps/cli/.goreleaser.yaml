# goreleaser config — builds the plynf CLI for 6 target platforms.
#
# Triggered by the release-cli.yml workflow on tag push. Outputs:
#   - GitHub Release with 6 binaries + checksums.txt
#   - Homebrew tap PR (plynf/homebrew-tap)
#   - SBOM per binary (syft)
#   - cosign signature on every artifact
#
# Local test:
#   cd apps/cli
#   goreleaser release --snapshot --clean

version: 2

project_name: plynf

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: plynf-cli
    main: ./
    binary: plynf
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/plynf/plynf/apps/cli/cmd.version={{.Version}}
      - -X github.com/plynf/plynf/apps/cli/cmd.gitCommit={{.Commit}}
      - -X github.com/plynf/plynf/apps/cli/cmd.buildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64        # Windows arm64 is fine, kept for future

archives:
  - id: plynf-cli
    # goreleaser v2: use `formats` instead of deprecated `format`
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "plynf_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      # goreleaser runs from apps/cli/ — reference root-level files via ../../
      - ../../LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# goreleaser v2: use `version_template` (singular, no name_ prefix)
snapshot:
  version_template: "{{ incpatch .Version }}-dev+{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# SBOM via syft, attached to the release
sboms:
  - artifacts: archive
    documents:
      - "${artifact}.spdx.json"

# Sign every artifact with cosign keyless
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all
    output: true

# Homebrew tap: add back once plynf/homebrew-tap repo exists and
# HOMEBREW_TAP_GITHUB_TOKEN is set in Actions secrets.
# Use goreleaser v2 key `homebrew_taps` (not the deprecated `brews`).
# Verified syntax example:
#
# homebrew_taps:
#   - name: plynf
#     homepage: "https://plynf.com"
#     description: "The runtime where production AI agents actually work"
#     license: "Apache-2.0"
#     repository:
#       owner: plynf
#       name: homebrew-tap
#       branch: main
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#       pull_request:
#         enabled: true
#     install: |
#       bin.install "plynf"
#     test: |
#       system "#{bin}/plynf --version"

release:
  github:
    # Release is published to the same repo the workflow runs in.
    # Goreleaser reads GITHUB_REPOSITORY automatically; explicit owner/name
    # is only needed when releasing to a *different* repo.
    owner: nico-schindlbeck-jpg
    name: plynf
  draft: false
  prerelease: auto
  name_template: "Plynf CLI {{.Version}}"
