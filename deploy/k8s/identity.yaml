# SPDX-License-Identifier: Apache-2.0
# Plinth — Identity service.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-identity-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: plinth
data:
  PLINTH_IDENTITY_DATA_DIR: "/data"
  PLINTH_IDENTITY_HOST: "0.0.0.0"
  PLINTH_IDENTITY_PORT: "7425"
  PLINTH_IDENTITY_ISSUER: "http://plinth-identity:7425"
  PLINTH_IDENTITY_LOG_LEVEL: "INFO"
  PLINTH_IDENTITY_LOG_FORMAT: "json"
  PLINTH_IDENTITY_AUTO_GENERATE_SECRET: "false"
  PLINTH_REPLICATION_MODE: "standalone"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plinth-identity-data
  namespace: plinth
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: plinth
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-identity
  namespace: plinth
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: identity
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7425"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: identity
          image: ghcr.io/nico-schindlbeck-jpg/plinth/identity:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7425
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-identity-config
          env:
            - name: PLINTH_IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: jwt-secret
            - name: PLINTH_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: postgres-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plinth-identity-data
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-identity
  namespace: plinth
  labels:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: identity
    app.kubernetes.io/part-of: plinth
  ports:
    - name: http
      port: 7425
      targetPort: 7425
      protocol: TCP
