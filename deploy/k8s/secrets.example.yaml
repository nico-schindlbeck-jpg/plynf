# SPDX-License-Identifier: Apache-2.0
# Plinth — example Secret manifest.
#
# This file is a TEMPLATE. Do NOT commit a populated copy with real values.
# Instead, generate the real Secret out-of-band (sealed-secrets, External
# Secrets Operator, AWS Secrets Manager via Secrets Store CSI, etc.) and
# delete this template before applying the rest of `deploy/k8s/`.
#
# All values must be base64-encoded. To generate a strong JWT secret:
#   openssl rand -base64 48 | tr -d '\n' | base64
#
# See `docs/deployment.md` for a full secret-management walkthrough.

apiVersion: v1
kind: Secret
metadata:
  name: plinth-secrets
  namespace: plinth
  labels:
    app.kubernetes.io/name: plinth
    app.kubernetes.io/part-of: plinth
type: Opaque
stringData:
  # Required — used by Identity to sign HS256 JWTs.
  jwt-secret: "REPLACE_ME_WITH_A_HIGH_ENTROPY_RANDOM_STRING"

  # Required only if Gateway OAuth flows are enabled.
  oauth-encryption-key: "REPLACE_ME_WITH_A_RANDOM_32_BYTE_KEY_BASE64"

  # GitHub OAuth (optional; required if github-mcp is enabled with OAuth).
  github-oauth-client-id: ""
  github-oauth-client-secret: ""

  # Slack OAuth (optional).
  slack-oauth-client-id: ""
  slack-oauth-client-secret: ""

  # Linear OAuth (optional).
  linear-oauth-client-id: ""
  linear-oauth-client-secret: ""

  # Postgres connection URL (optional; required for prod overlay).
  # Format: postgresql+psycopg://user:pass@host:5432/plinth
  postgres-url: ""
