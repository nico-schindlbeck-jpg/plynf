# Plynf — Dashboard service.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-dashboard-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: plinth
data:
  PLINTH_DASHBOARD_HOST: "0.0.0.0"
  PLINTH_DASHBOARD_PORT: "7424"
  PLINTH_DASHBOARD_WORKSPACE_URL: "http://plinth-workspace:7421"
  PLINTH_DASHBOARD_GATEWAY_URL: "http://plinth-gateway:7422"
  PLINTH_DASHBOARD_IDENTITY_URL: "http://plinth-identity:7425"
  PLINTH_DASHBOARD_MOCK_MCP_URL: "http://plinth-mock-mcp:7423"
  PLINTH_DASHBOARD_LOG_LEVEL: "INFO"
  PLINTH_DASHBOARD_LOG_FORMAT: "json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-dashboard
  namespace: plinth
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: ui
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7424"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dashboard
          image: ghcr.io/nico-schindlbeck-jpg/plinth/dashboard:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7424
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-dashboard-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-dashboard
  namespace: plinth
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/part-of: plinth
  ports:
    - name: http
      port: 7424
      targetPort: 7424
      protocol: TCP
