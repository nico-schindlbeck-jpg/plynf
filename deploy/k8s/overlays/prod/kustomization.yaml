# SPDX-License-Identifier: Apache-2.0
# Plynf — prod overlay.
#
# - 3 replicas for Gateway + Dashboard (stateless)
# - HPA for Gateway (CPU-driven, 3..10 replicas)
# - Workspace + Identity stay at 1 replica unless backed by Postgres
#   (StatefulSet semantics for SQLite are 1-pod-only).
# - Larger resource limits
# - Optional Postgres (uncomment under resources)
#
# IMPORTANT: assumes you've replaced `secrets.example.yaml` with a real
# Secret resource generated by SealedSecrets / ESO / etc.
#
# Apply with:
#   kubectl apply -k deploy/k8s/overlays/prod/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plinth

resources:
  - ../../
  # Uncomment to deploy a single-node Postgres in-cluster (NOT recommended
  # for real production — use a managed DB and set postgres-url in Secret).
  # - ../../postgres.yaml
  - hpa.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/instance: plinth-prod
  app.plynf.com/environment: prod

replicas:
  - name: plinth-gateway
    count: 3
  - name: plinth-dashboard
    count: 3

patches:
  - target:
      kind: Deployment
      name: plinth-gateway
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  - target:
      kind: Deployment
      name: plinth-workspace
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  - target:
      kind: Deployment
      name: plinth-identity
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "100m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
  - target:
      kind: PersistentVolumeClaim
      name: plinth-workspace-data
    patch: |
      - op: replace
        path: /spec/resources/requests/storage
        value: "100Gi"
