# SPDX-License-Identifier: Apache-2.0
# Plinth — Mock MCP server (used by demos + smoke tests).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-mock-mcp-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: mock-mcp
    app.kubernetes.io/part-of: plinth
data:
  PLINTH_MOCK_HOST: "0.0.0.0"
  PLINTH_MOCK_PORT: "7423"
  PLINTH_MOCK_FIXTURES_DIR: "/tmp/plinth-mock-fixtures"
  PLINTH_MOCK_LOG_LEVEL: "INFO"
  PLINTH_MOCK_LOG_FORMAT: "json"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-mock-mcp
  namespace: plinth
  labels:
    app.kubernetes.io/name: mock-mcp
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-mcp
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-mcp
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mock-mcp
          image: ghcr.io/nico-schindlbeck-jpg/plinth/mock-mcp:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7423
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-mock-mcp-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-mock-mcp
  namespace: plinth
  labels:
    app.kubernetes.io/name: mock-mcp
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mock-mcp
    app.kubernetes.io/part-of: plinth
  ports:
    - name: http
      port: 7423
      targetPort: 7423
      protocol: TCP
