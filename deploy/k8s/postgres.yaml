# SPDX-License-Identifier: Apache-2.0
# Plinth — Single-node Postgres for the prod overlay.
#
# This is a STARTING POINT. For production, use a managed Postgres
# (RDS, Cloud SQL, Aiven, etc.) and point services at it via
# `secrets.postgres-url`. This manifest is only included so a
# self-hosted operator can stand the whole stack up in one apply.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-postgres-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: plinth
data:
  POSTGRES_DB: "plinth"
  POSTGRES_USER: "plinth"
  PGDATA: "/var/lib/postgresql/data/pgdata"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plinth-postgres-data
  namespace: plinth
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: plinth
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plinth-postgres
  namespace: plinth
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: database
spec:
  serviceName: plinth-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "plinth", "-d", "plinth"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "plinth", "-d", "plinth"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plinth-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-postgres
  namespace: plinth
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  clusterIP: None    # Headless — for stable hostname.
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: plinth
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
