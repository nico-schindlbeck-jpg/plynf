# SPDX-License-Identifier: Apache-2.0
# Plynf — Workspace service.
# ConfigMap + PersistentVolumeClaim + Deployment + Service.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-workspace-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: plinth
data:
  PLINTH_DATA_DIR: "/data"
  PLINTH_WORKSPACE_HOST: "0.0.0.0"
  PLINTH_WORKSPACE_PORT: "7421"
  PLINTH_LOG_LEVEL: "INFO"
  PLINTH_LOG_FORMAT: "json"
  PLINTH_REPLICATION_MODE: "standalone"
  PLINTH_AUTO_MIGRATE: "true"
  PLINTH_LEASE_REAPER_ENABLED: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plinth-workspace-data
  namespace: plinth
  labels:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: plinth
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-workspace
  namespace: plinth
  labels:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  strategy:
    type: Recreate    # SQLite-backed; safer to swap pods one at a time.
  selector:
    matchLabels:
      app.kubernetes.io/name: workspace
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workspace
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: storage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7421"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workspace
          image: ghcr.io/nico-schindlbeck-jpg/plinth/workspace:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7421
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-workspace-config
          env:
            - name: PLINTH_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: postgres-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plinth-workspace-data
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-workspace
  namespace: plinth
  labels:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: workspace
    app.kubernetes.io/part-of: plinth
  ports:
    - name: http
      port: 7421
      targetPort: 7421
      protocol: TCP
