# Plinth — Gateway service.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-gateway-config
  namespace: plinth
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: plinth
data:
  PLINTH_DATA_DIR: "/data"
  PLINTH_GATEWAY_HOST: "0.0.0.0"
  PLINTH_GATEWAY_PORT: "7422"
  PLINTH_LOG_LEVEL: "INFO"
  PLINTH_LOG_FORMAT: "json"
  PLINTH_GATEWAY_RATE_LIMITS_ENABLED: "true"
  PLINTH_GATEWAY_LOAD_SHED_ENABLED: "false"
  PLINTH_GATEWAY_WORKSPACE_URL: "http://plinth-workspace:7421"
  PLINTH_GATEWAY_IDENTITY_URL: "http://plinth-identity:7425"
  PLINTH_REPLICATION_MODE: "standalone"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plinth-gateway-data
  namespace: plinth
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: plinth
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-gateway
  namespace: plinth
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: plinth
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/part-of: plinth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: plinth
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7422"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/nico-schindlbeck-jpg/plinth/gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7422
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-gateway-config
          env:
            - name: PLINTH_GATEWAY_OAUTH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: oauth-encryption-key
                  optional: true
            - name: PLINTH_GATEWAY_GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: github-oauth-client-id
                  optional: true
            - name: PLINTH_GATEWAY_GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: github-oauth-client-secret
                  optional: true
            - name: PLINTH_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: plinth-secrets
                  key: postgres-url
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plinth-gateway-data
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-gateway
  namespace: plinth
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: plinth
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: plinth
  ports:
    - name: http
      port: 7422
      targetPort: 7422
      protocol: TCP
