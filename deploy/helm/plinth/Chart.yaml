# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: plinth
description: |
  Plynf — agent-native infrastructure platform.
  Deploys Workspace, Gateway, Identity, Dashboard, and the bundled MCP servers
  with sane defaults, optional Postgres, and Ingress / HPA / NetworkPolicy
  hooks suitable for production use.
type: application

# Chart version — bumped independently of appVersion. SemVer.
version: 1.0.0

# Application version — pinned to a Plynf release.
appVersion: "1.0.0"

home: https://github.com/nico-schindlbeck-jpg/plynf
sources:
  - https://github.com/nico-schindlbeck-jpg/plynf
icon: https://raw.githubusercontent.com/nico-schindlbeck-jpg/plinth/main/docs/assets/logo.svg

keywords:
  - plynf
  - agents
  - mcp
  - llm
  - infrastructure
  - workspace
  - gateway

maintainers:
  - name: The Plynf Authors
    url: https://github.com/nico-schindlbeck-jpg/plynf

# Kubernetes version constraint — tested on 1.27+.
kubeVersion: ">=1.27.0-0"

annotations:
  artifacthub.io/changes: |
    - Initial Plynf Helm chart for v1.0 GA.
