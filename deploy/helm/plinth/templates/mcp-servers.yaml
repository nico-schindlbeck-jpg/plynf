{{- /*
SPDX-License-Identifier: Apache-2.0
Plynf — bundled MCP servers (mock + github + slack + linear).

Each MCP server is structurally identical: ConfigMap + Deployment + Service.
We loop over a small dict of (key, name, port, oauthSlug) so adding a new MCP
server only requires a new entry in `values.yaml` plus a line here.
*/ -}}
{{- $servers := dict
  "mockMcp"  (dict "name" "mock-mcp"   "envPrefix" "PLINTH_MOCK_MCP"   "logVar" "PLINTH_MOCK_LOG_LEVEL"   "extraEnv" "PLINTH_MOCK_FIXTURES_DIR=/tmp/plinth-mock-fixtures" "oauth" false)
  "githubMcp" (dict "name" "github-mcp" "envPrefix" "PLINTH_GITHUB_MCP" "logVar" "PLINTH_GITHUB_MCP_LOG_LEVEL" "extraEnv" "" "oauth" "github")
  "slackMcp"  (dict "name" "slack-mcp"  "envPrefix" "PLINTH_SLACK_MCP"  "logVar" "PLINTH_SLACK_MCP_LOG_LEVEL"  "extraEnv" "" "oauth" "slack")
  "linearMcp" (dict "name" "linear-mcp" "envPrefix" "PLINTH_LINEAR_MCP" "logVar" "PLINTH_LINEAR_MCP_LOG_LEVEL" "extraEnv" "" "oauth" "linear")
}}
{{- range $key, $info := $servers }}
{{- $cfg := index $.Values $key }}
{{- if $cfg.enabled }}
{{- $svc := $info.name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-{{ $svc }}-config
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" $ "svc" $svc) | nindent 4 }}
data:
  {{ $info.envPrefix }}_HOST: "0.0.0.0"
  {{ $info.envPrefix }}_PORT: {{ $cfg.service.port | quote }}
  {{ $info.logVar }}: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-{{ $svc }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" $ "svc" $svc) | nindent 4 }}
spec:
  replicas: {{ $cfg.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "plinth.service.selectorLabels" (dict "ctx" $ "svc" $svc) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plinth.service.labels" (dict "ctx" $ "svc" $svc) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "plinth.serviceAccountName" $ }}
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "plinth.podSecurityContext" $ | nindent 8 }}
      containers:
        - name: {{ $svc }}
          image: {{ include "plinth.image" (dict "ctx" $ "svc" $svc "config" $cfg) | quote }}
          imagePullPolicy: {{ $.Values.global.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-{{ $svc }}-config
          {{- if $info.oauth }}
          env:
            - name: PLINTH_{{ $info.oauth | upper }}_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ default "plinth-secrets" $.Values.existingSecret }}
                  key: {{ $info.oauth }}-oauth-client-id
                  optional: true
            - name: PLINTH_{{ $info.oauth | upper }}_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ default "plinth-secrets" $.Values.existingSecret }}
                  key: {{ $info.oauth }}-oauth-client-secret
                  optional: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          securityContext:
            {{- include "plinth.containerSecurityContext" $ | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-{{ $svc }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" $ "svc" $svc) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "plinth.service.selectorLabels" (dict "ctx" $ "svc" $svc) | nindent 4 }}
  ports:
    - name: http
      port: {{ $cfg.service.port }}
      targetPort: {{ $cfg.service.port }}
      protocol: TCP
{{- end }}
{{- end }}
