{{- /*
SPDX-License-Identifier: Apache-2.0
Plynf — application Secret.

Holds JWT secret, OAuth credentials, optional Postgres URL. Templated only when
the user provides values via --set / --set-file. Operators are encouraged to
manage these out-of-band (sealed-secrets, ESO, Secrets Store CSI) and disable
this template by setting `existingSecret`.
*/ -}}
{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: plinth-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plinth.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.identity.jwtSecret | default "" | quote }}
  oauth-encryption-key: {{ .Values.gateway.oauth.encryptionKey | default "" | quote }}
  github-oauth-client-id: {{ .Values.gateway.oauth.github.clientId | default "" | quote }}
  github-oauth-client-secret: {{ .Values.gateway.oauth.github.clientSecret | default "" | quote }}
  slack-oauth-client-id: {{ .Values.gateway.oauth.slack.clientId | default "" | quote }}
  slack-oauth-client-secret: {{ .Values.gateway.oauth.slack.clientSecret | default "" | quote }}
  linear-oauth-client-id: {{ .Values.gateway.oauth.linear.clientId | default "" | quote }}
  linear-oauth-client-secret: {{ .Values.gateway.oauth.linear.clientSecret | default "" | quote }}
  postgres-url: {{ .Values.workspace.postgresUrl | default "" | quote }}
  {{- if .Values.postgres.enabled }}
  postgres-password: {{ required "postgres.password is required when postgres.enabled=true" .Values.postgres.password | quote }}
  {{- end }}
{{- end }}
