{{- /* SPDX-License-Identifier: Apache-2.0 */ -}}
{{- if .Values.dashboard.enabled -}}
{{- $svc := "dashboard" -}}
{{- $cfg := .Values.dashboard -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plinth-dashboard-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" . "svc" $svc) | nindent 4 }}
data:
  PLINTH_DASHBOARD_HOST: "0.0.0.0"
  PLINTH_DASHBOARD_PORT: {{ $cfg.service.port | quote }}
  PLINTH_DASHBOARD_WORKSPACE_URL: "http://plinth-workspace:{{ .Values.workspace.service.port }}"
  PLINTH_DASHBOARD_GATEWAY_URL: "http://plinth-gateway:{{ .Values.gateway.service.port }}"
  PLINTH_DASHBOARD_IDENTITY_URL: "http://plinth-identity:{{ .Values.identity.service.port }}"
  PLINTH_DASHBOARD_MOCK_MCP_URL: "http://plinth-mock-mcp:{{ .Values.mockMcp.service.port }}"
  PLINTH_DASHBOARD_LOG_LEVEL: {{ $cfg.config.logLevel | quote }}
  PLINTH_DASHBOARD_LOG_FORMAT: {{ $cfg.config.logFormat | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinth-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" . "svc" $svc) | nindent 4 }}
spec:
  replicas: {{ $cfg.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "plinth.service.selectorLabels" (dict "ctx" . "svc" $svc) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "plinth.service.labels" (dict "ctx" . "svc" $svc) | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $cfg.service.port | quote }}
        prometheus.io/path: "/metrics"
        {{- with $cfg.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "plinth.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "plinth.podSecurityContext" . | nindent 8 }}
      containers:
        - name: dashboard
          image: {{ include "plinth.image" (dict "ctx" . "svc" $svc "config" $cfg) | quote }}
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $cfg.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: plinth-dashboard-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml $cfg.resources | nindent 12 }}
          securityContext:
            {{- include "plinth.containerSecurityContext" . | nindent 12 }}
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: plinth-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "plinth.service.labels" (dict "ctx" . "svc" $svc) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "plinth.service.selectorLabels" (dict "ctx" . "svc" $svc) | nindent 4 }}
  ports:
    - name: http
      port: {{ $cfg.service.port }}
      targetPort: {{ $cfg.service.port }}
      protocol: TCP
{{- end }}
