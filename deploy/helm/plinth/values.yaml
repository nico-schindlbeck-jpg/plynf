# SPDX-License-Identifier: Apache-2.0
# Plinth — Helm chart default values.

# Optional: name of an externally-managed Secret containing the keys listed
# in `deploy/k8s/secrets.example.yaml`. When set, the chart will NOT create
# its own `plinth-secrets` Secret, and individual `*.jwtSecret` /
# `oauth.*.clientSecret` values are ignored.
existingSecret: ""

# Whether the chart should emit a Namespace resource. Most operators rely on
# `helm install --create-namespace` instead and leave this off.
createNamespace: false

# Optional override for the chart name (rarely used).
nameOverride: ""

global:
  imageRegistry: ghcr.io/nico-schindlbeck-jpg/plinth
  imageTag: "1.0.0"
  pullPolicy: IfNotPresent
  imagePullSecrets: []
  storageClass: ""               # "" => cluster default
  region: ""                     # PLINTH_REGION_ID for all services
  replicationMode: standalone    # standalone | primary | replica
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  serviceAccount:
    create: true
    name: ""
    annotations: {}              # e.g. eks.amazonaws.com/role-arn

# ----------------------------------------------------------------------
# Workspace service
# ----------------------------------------------------------------------
workspace:
  enabled: true
  replicas: 1
  image:
    repository: workspace
    tag: ""                      # "" => global.imageTag
  service:
    port: 7421
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
    storageClass: ""             # "" => global.storageClass
  postgresUrl: ""                # If set, used instead of SQLite
  config:
    autoMigrate: true
    leaseReaperEnabled: true
    logLevel: "INFO"
    logFormat: "json"
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------
# Gateway service
# ----------------------------------------------------------------------
gateway:
  enabled: true
  replicas: 1
  image:
    repository: gateway
    tag: ""
  service:
    port: 7422
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  config:
    rateLimitsEnabled: true
    loadShedEnabled: false
    logLevel: "INFO"
    logFormat: "json"
  oauth:
    enabled: false
    encryptionKey: ""            # Required if enabled. Best supplied via --set-file or external secret.
    github:
      clientId: ""
      clientSecret: ""
    slack:
      clientId: ""
      clientSecret: ""
    linear:
      clientId: ""
      clientSecret: ""
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 2
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------
# Identity service
# ----------------------------------------------------------------------
identity:
  enabled: true
  replicas: 1
  image:
    repository: identity
    tag: ""
  service:
    port: 7425
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  jwtSecret: ""                  # REQUIRED. Pass via --set-file or external secret.
  issuer: "http://plinth-identity:7425"
  config:
    logLevel: "INFO"
    logFormat: "json"
    autoGenerateSecret: false
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------
# Dashboard service
# ----------------------------------------------------------------------
dashboard:
  enabled: true
  replicas: 1
  image:
    repository: dashboard
    tag: ""
  service:
    port: 7424
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  config:
    logLevel: "INFO"
    logFormat: "json"
  ingress:
    enabled: false
    className: ""
    host: "dashboard.plinth.example"
    annotations: {}              # e.g. cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      enabled: false
      secretName: "plinth-dashboard-tls"
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ----------------------------------------------------------------------
# MCP servers
# ----------------------------------------------------------------------
mockMcp:
  enabled: true
  replicas: 1
  image:
    repository: mock-mcp
    tag: ""
  service:
    port: 7423
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

githubMcp:
  enabled: false
  replicas: 1
  image:
    repository: github-mcp
    tag: ""
  service:
    port: 7426
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

slackMcp:
  enabled: false
  replicas: 1
  image:
    repository: slack-mcp
    tag: ""
  service:
    port: 7427
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

linearMcp:
  enabled: false
  replicas: 1
  image:
    repository: linear-mcp
    tag: ""
  service:
    port: 7428
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ----------------------------------------------------------------------
# Postgres (optional, in-cluster — managed DB recommended for prod)
# ----------------------------------------------------------------------
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
  service:
    port: 5432
  database: plinth
  username: plinth
  password: ""                   # REQUIRED if enabled.
  persistence:
    enabled: true
    size: 50Gi
    accessMode: ReadWriteOnce
    storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ----------------------------------------------------------------------
# Ingress (umbrella) and NetworkPolicy
# ----------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  gateway:
    enabled: false
    host: "api.plinth.example"
    annotations: {}
    tls:
      enabled: false
      secretName: "plinth-gateway-tls"

networkPolicy:
  enabled: false
  # Only services with the `app.kubernetes.io/part-of: plinth` label can
  # talk to other Plinth services. Egress to internet is allowed (for
  # external MCP server traffic / OAuth flows).
