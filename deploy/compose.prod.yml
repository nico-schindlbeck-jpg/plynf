# Plinth — production deployment via pre-built GHCR images.
#
# Used by `plinth up` (Block 3 CLI) and by ops teams who self-host
# without wanting to build from source. No `build:` directives —
# images are pulled from GitHub Container Registry.
#
# Setup (one-time):
#   PLINTH_ORG must be set to your GHCR org or user namespace. After
#   Block 0.3 lands, the canonical value will be 'plinth' (assuming
#   we register that org). Until then, set it explicitly:
#     export PLINTH_ORG=nico-schindlbeck-jpg
#     export PLINTH_VERSION=1.7.5
#
# Usage:
#   docker compose -f deploy/compose.prod.yml pull
#   docker compose -f deploy/compose.prod.yml up -d --wait --wait-timeout 120
#   docker compose -f deploy/compose.prod.yml logs -f workspace
#   docker compose -f deploy/compose.prod.yml down -v
#
# Image signatures: verify with cosign before deploying in regulated
# environments:
#   cosign verify ghcr.io/${PLINTH_ORG}/plinth-workspace:${PLINTH_VERSION} \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate-identity-regexp "^https://github.com/${PLINTH_ORG}/plinth/"

x-base-env: &base-env
  PLINTH_LOG_LEVEL: "${PLINTH_LOG_LEVEL:-INFO}"
  PLINTH_LOG_FORMAT: "${PLINTH_LOG_FORMAT:-json}"
  PLINTH_DATA_DIR: /data

x-base-healthcheck: &base-healthcheck
  interval: 10s
  timeout: 3s
  retries: 5
  start_period: 5s

services:
  workspace:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-workspace:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-workspace
    ports:
      - "${PLINTH_WORKSPACE_PORT:-7421}:7421"
    environment:
      <<: *base-env
      PLINTH_WORKSPACE_PORT: "7421"
    volumes:
      - plinth_data:/data
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7421/healthz\").read()'"]
    restart: unless-stopped
    labels:
      io.plinth.service: "workspace"
      io.plinth.version: "${PLINTH_VERSION:-latest}"

  gateway:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-gateway:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-gateway
    ports:
      - "${PLINTH_GATEWAY_PORT:-7422}:7422"
    environment:
      <<: *base-env
      PLINTH_GATEWAY_PORT: "7422"
    volumes:
      - plinth_data:/data
    depends_on:
      workspace: { condition: service_healthy }
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7422/healthz\").read()'"]
    restart: unless-stopped
    labels:
      io.plinth.service: "gateway"
      io.plinth.version: "${PLINTH_VERSION:-latest}"

  identity:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-identity:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-identity
    ports:
      - "${PLINTH_IDENTITY_PORT:-7425}:7425"
    environment:
      <<: *base-env
      PLINTH_IDENTITY_PORT: "7425"
      PLINTH_IDENTITY_DATA_DIR: /data/identity
    volumes:
      - plinth_data:/data
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7425/healthz\").read()'"]
    restart: unless-stopped
    labels:
      io.plinth.service: "identity"
      io.plinth.version: "${PLINTH_VERSION:-latest}"

  dashboard:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-dashboard:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-dashboard
    ports:
      - "${PLINTH_DASHBOARD_PORT:-7424}:7424"
    environment:
      <<: *base-env
      PLINTH_DASHBOARD_PORT: "7424"
      PLINTH_WORKSPACE_URL: "http://workspace:7421"
      PLINTH_GATEWAY_URL: "http://gateway:7422"
      PLINTH_IDENTITY_URL: "http://identity:7425"
    depends_on:
      workspace: { condition: service_healthy }
      gateway:   { condition: service_healthy }
      identity:  { condition: service_healthy }
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7424/healthz\").read()'"]
    restart: unless-stopped
    labels:
      io.plinth.service: "dashboard"
      io.plinth.version: "${PLINTH_VERSION:-latest}"

  mock-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-mock-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-mock-mcp
    ports:
      - "${PLINTH_MOCK_MCP_PORT:-7423}:7423"
    environment:
      <<: *base-env
      PLINTH_MOCK_MCP_PORT: "7423"
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7423/healthz\").read()'"]
    restart: unless-stopped
    labels:
      io.plinth.service: "mock-mcp"
      io.plinth.version: "${PLINTH_VERSION:-latest}"

  # ──────────── OAuth MCP servers (eight providers) ────────────
  github-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-github-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-github-mcp
    ports: ["${PLINTH_GITHUB_MCP_PORT:-7426}:7426"]
    environment:
      <<: *base-env
      PLINTH_GITHUB_MCP_PORT: "7426"
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7426/healthz\").read()'"]
    restart: unless-stopped
    labels: { io.plinth.service: "github-mcp", io.plinth.version: "${PLINTH_VERSION:-latest}" }

  slack-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-slack-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-slack-mcp
