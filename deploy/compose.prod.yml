  atlassian-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-atlassian-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-atlassian-mcp
    ports: ["${PLINTH_ATLASSIAN_MCP_PORT:-7431}:7431"]
    environment:
      <<: *base-env
      PLINTH_ATLASSIAN_MCP_PORT: "7431"
    healthcheck:
      <<: *base-healthcheck
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7431/healthz\").read()'"]
    restart: unless-stopped
    labels: { io.plinth.service: "atlassian-mcp", io.plinth.version: "${PLINTH_VERSION:-latest}" }

  salesforce-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-salesforce-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-salesforce-mcp
