      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7429/healthz\").read()'"]
    restart: unless-stopped
    labels: { io.plinth.service: "notion-mcp", io.plinth.version: "${PLINTH_VERSION:-latest}" }

  google-mcp:
