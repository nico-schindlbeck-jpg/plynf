      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7427/healthz\").read()'"]
    restart: unless-stopped
    labels: { io.plinth.service: "slack-mcp", io.plinth.version: "${PLINTH_VERSION:-latest}" }

  linear-mcp:
    image: ghcr.io/${PLINTH_ORG:?PLINTH_ORG must be set}/plinth-linear-mcp:${PLINTH_VERSION:-latest}
    pull_policy: always
    container_name: plinth-linear-mcp
    ports: ["${PLINTH_LINEAR_MCP_PORT:-7428}:7428"]
    environment:
      <<: *base-env
      PLINTH_LINEAR_MCP_PORT: "7428"
    healthcheck:
