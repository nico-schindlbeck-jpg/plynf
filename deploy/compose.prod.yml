# Plynf — production stack from GHCR pre-built images.
#
# Usage:
#   export PLYNF_ORG="plynf"   # or the future plynf GitHub org
#   export PLYNF_VERSION="v1.7"               # or any released tag
#   docker compose -f deploy/compose.prod.yml pull
#   docker compose -f deploy/compose.prod.yml up -d --wait
#
# Differences from the root docker-compose.yml:
#   - No `build:` directives. Images are pulled from ghcr.io, not built
#     locally. Cold-start time drops from 8-15 min (local build) to
#     30-90s (parallel pull).
#   - `pull_policy: always` so a `compose up` always picks up newer tags
#     when PLYNF_VERSION moves.
#   - Images are signed (cosign keyless) and have SBOM attestations
#     attached. See deploy/registry.md for verification.
#
# Internal env vars keep their PLINTH_ prefix — that's the runtime API
# contract baked into services. Don't rename without coordinating a
# migration (would break existing users' data dirs and config).
#
# To pin to immutable digests instead of mutable tags, run:
#   scripts/pin-compose-digests.sh deploy/compose.prod.yml v1.7
# Produces deploy/compose.prod.pinned.yml with @sha256:... refs.

# ─── Shared YAML anchors ──────────────────────────────────────────────
x-defaults: &defaults
  pull_policy: always
  restart: unless-stopped

x-logging: &logging
  PLINTH_LOG_LEVEL: "${PLINTH_LOG_LEVEL:-INFO}"
  PLINTH_LOG_FORMAT: "${PLINTH_LOG_FORMAT:-json}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 3s
  retries: 5
  start_period: 8s

services:
  # ─── Core platform services ─────────────────────────────────────────

  workspace:
    <<: *defaults
    image: ghcr.io/${PLYNF_ORG:-plynf}/plynf-workspace:${PLYNF_VERSION:-latest}
    container_name: plynf-workspace
    ports:
      - "${PLINTH_WORKSPACE_PORT:-7421}:7421"
    environment:
      <<: *logging
      PLINTH_DATA_DIR: /data
      PLINTH_WORKSPACE_PORT: "7421"
    volumes:
      - plynf_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7421/healthz\").read()'"]

  gateway:
    <<: *defaults
    image: ghcr.io/${PLYNF_ORG:-plynf}/plynf-gateway:${PLYNF_VERSION:-latest}
    container_name: plynf-gateway
    ports:
      - "${PLINTH_GATEWAY_PORT:-7422}:7422"
    environment:
      <<: *logging
      PLINTH_DATA_DIR: /data
      PLINTH_GATEWAY_PORT: "7422"
      PLINTH_WORKSPACE_URL: "http://workspace:7421"
      PLINTH_IDENTITY_URL: "http://identity:7425"
    volumes:
      - plynf_data:/data
    depends_on:
      workspace:
        condition: service_healthy
      identity:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7422/healthz\").read()'"]

  identity:
    <<: *defaults
    image: ghcr.io/${PLYNF_ORG:-plynf}/plynf-identity:${PLYNF_VERSION:-latest}
    container_name: plynf-identity
    ports:
      - "${PLINTH_IDENTITY_PORT:-7425}:7425"
    environment:
      <<: *logging
      PLINTH_IDENTITY_DATA_DIR: /data
      PLINTH_IDENTITY_PORT: "7425"
    volumes:
      - plynf_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7425/healthz\").read()'"]

  dashboard:
    <<: *defaults
    image: ghcr.io/${PLYNF_ORG:-plynf}/plynf-dashboard:${PLYNF_VERSION:-latest}
    container_name: plynf-dashboard
    ports:
      - "${PLINTH_DASHBOARD_PORT:-7424}:7424"
    environment:
      <<: *logging
      PLINTH_DASHBOARD_PORT: "7424"
      PLINTH_WORKSPACE_URL: "http://workspace:7421"
      PLINTH_GATEWAY_URL: "http://gateway:7422"
      PLINTH_IDENTITY_URL: "http://identity:7425"
    depends_on:
      workspace:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7424/healthz\").read()'"]

  # ─── Mock MCP (for demos + tests without real OAuth) ────────────────

  mock-mcp:
    <<: *defaults
    image: ghcr.io/${PLYNF_ORG:-plynf}/plynf-mock-mcp:${PLYNF_VERSION:-latest}
    container_name: plynf-mock-mcp
    ports:
      - "${PLINTH_MOCK_MCP_PORT:-7423}:7423"
    environment:
      PLINTH_MOCK_PORT: "7423"
      PLINTH_MOCK_FIXTURES_DIR: /tmp/plynf-mock-fixtures
      PLINTH_MOCK_LOG_LEVEL: "${PLINTH_LOG_LEVEL:-INFO}"
      PLINTH_MOCK_LOG_FORMAT: "${PLINTH_LOG_FORMAT:-json}"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7423/healthz\").read()'"]

  # ─── OAuth MCP servers (eight providers) ────────────────────────────

  github-mcp:
