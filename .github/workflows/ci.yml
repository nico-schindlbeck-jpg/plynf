name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (${{ matrix.suite }}) on Py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        suite:
          - workspace
          - gateway
          - identity
          - sdk-python
          - mock-mcp
          - dashboard
          - github-mcp
          - slack-mcp
          - linear-mcp
          - worker
          - benchmarks
          - cli
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plinth_test
          POSTGRES_PASSWORD: plinth_test
          POSTGRES_DB: plinth_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PLINTH_TEST_POSTGRES_URL: postgresql://plinth_test:plinth_test@localhost:5432/plinth_test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel

      - name: Install component
        run: |
          set -e
          case "${{ matrix.suite }}" in
            workspace)    pip install -e "./services/workspace[dev]" ;;
            gateway)      pip install -e "./services/gateway[dev]" ;;
            identity)     pip install -e "./services/identity[dev]" ;;
            sdk-python)
              pip install -e "./services/workspace[dev]"
              pip install -e "./services/gateway[dev]"
              pip install -e "./services/identity[dev]"
              pip install -e "./sdk/python[dev]"
              ;;
            mock-mcp)     pip install -e "./mock-mcp-server[dev]" ;;
            dashboard)    pip install -e "./services/dashboard[dev]" ;;
            github-mcp)   pip install -e "./mcp-servers/github[dev]" ;;
            slack-mcp)    pip install -e "./mcp-servers/slack[dev]" ;;
            linear-mcp)   pip install -e "./mcp-servers/linear[dev]" ;;
            worker)
              pip install -e "./sdk/python[dev]"
              pip install -e "./worker[dev]"
              ;;
            benchmarks)   pip install -e "./benchmarks[dev]" ;;
            cli)
              pip install -e "./sdk/python[dev]"
              pip install -e "./cli[dev]"
              ;;
          esac

      - name: Test
        run: |
          set -e
          case "${{ matrix.suite }}" in
            workspace)    cd services/workspace && pytest -q --cov=plinth_workspace ;;
            gateway)      cd services/gateway && pytest -q --cov=plinth_gateway ;;
            identity)     cd services/identity && pytest -q --cov=plinth_identity ;;
            sdk-python)   cd sdk/python && pytest -q --cov=plinth ;;
            mock-mcp)     cd mock-mcp-server && pytest -q --cov=mock_mcp ;;
            dashboard)    cd services/dashboard && pytest -q --cov=plinth_dashboard ;;
            github-mcp)   cd mcp-servers/github && pytest -q --cov=github_mcp ;;
            slack-mcp)    cd mcp-servers/slack && pytest -q --cov=slack_mcp ;;
            linear-mcp)   cd mcp-servers/linear && pytest -q --cov=linear_mcp ;;
            worker)       cd worker && pytest -q --cov=plinth_workflow_worker ;;
            benchmarks)   cd benchmarks && pytest -q ;;
            cli)          cd cli && pytest -q --cov=plinth_cli ;;
          esac

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install
        run: cd sdk/typescript && npm install

      - name: Build
        run: cd sdk/typescript && npm run build

      - name: Test
        run: cd sdk/typescript && npm test

  typescript-worker:
    name: TypeScript Worker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worker-ts/package-lock.json

      - name: Build SDK
        run: cd sdk/typescript && npm install && npm run build

      - name: Install worker
        run: cd worker-ts && npm install

      - name: Build worker
        run: cd worker-ts && npm run build

      - name: Test worker
        run: cd worker-ts && npm test

  specs:
    name: API specs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate OpenAPI specs
        run: |
          pip install openapi-spec-validator
          openapi-spec-validator specs/openapi/workspace.yaml
          openapi-spec-validator specs/openapi/gateway.yaml

      - name: Validate JSON schemas
        run: |
          python -c "import json; json.load(open('specs/schemas/event.schema.json'))"
          python -c "import json; json.load(open('specs/schemas/capability-token.schema.json'))"

  contract:
    name: API contract tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install services + contract suite
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e "./services/workspace[dev]"
          pip install -e "./services/gateway[dev]"
          pip install -e "./services/identity[dev]"
          pip install -e "./mock-mcp-server[dev]"
          pip install -e "./tests/contract[dev]"

      - name: Run contract tests (in-process FastAPI apps)
        run: cd tests/contract && pytest -q

  openapi-diff:
    name: OpenAPI breaking-change diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          path: pr
          fetch-depth: 0

      - name: Checkout base ref (main)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Diff workspace spec
        run: |
          python pr/scripts/openapi_diff.py \
            base/specs/openapi/workspace.yaml \
            pr/specs/openapi/workspace.yaml

      - name: Diff gateway spec
        run: |
          python pr/scripts/openapi_diff.py \
            base/specs/openapi/gateway.yaml \
            pr/specs/openapi/gateway.yaml
