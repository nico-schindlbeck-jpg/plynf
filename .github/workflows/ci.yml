name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (services + SDK)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e "./services/workspace[dev]"
          pip install -e "./services/gateway[dev]"
          pip install -e "./sdk/python[dev]"
          pip install -e "./examples/01-research-agent"
          if [ -d "./mock-mcp-server" ]; then
            pip install -e "./mock-mcp-server[dev]"
          fi

      - name: Lint
        run: |
          ruff check services sdk/python examples/01-research-agent || true
          if [ -d "./mock-mcp-server" ]; then ruff check mock-mcp-server || true; fi

      - name: Test workspace service
        run: cd services/workspace && pytest -q --cov=plinth_workspace

      - name: Test gateway service
        run: cd services/gateway && pytest -q --cov=plinth_gateway

      - name: Test Python SDK
        run: cd sdk/python && pytest -q --cov=plinth

      - name: Test mock-mcp server
        run: |
          if [ -d "./mock-mcp-server" ]; then
            cd mock-mcp-server && pytest -q --cov=mock_mcp
          else
            echo "mock-mcp-server not present; skipping"
          fi

      - name: Run headline demo (simulation)
        run: python examples/01-research-agent/compare.py --topic "renewable energy" --mode simulation

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json

      - name: Install
        run: cd sdk/typescript && npm install

      - name: Build
        run: cd sdk/typescript && npm run build

      - name: Test
        run: cd sdk/typescript && npm test

  specs:
    name: API specs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate OpenAPI specs
        run: |
          pip install openapi-spec-validator
          openapi-spec-validator specs/openapi/workspace.yaml
          openapi-spec-validator specs/openapi/gateway.yaml

      - name: Validate JSON schemas
        run: |
          python -c "import json; json.load(open('specs/schemas/event.schema.json'))"
          python -c "import json; json.load(open('specs/schemas/capability-token.schema.json'))"
