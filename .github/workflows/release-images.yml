name: release-images

# Builds, signs, and publishes Docker images for all 13 Plynf services
# to GitHub Container Registry. Triggered on tag push or manual dispatch.
#
# Outputs per service: linux/amd64 + linux/arm64 multi-arch manifest,
# cosign-signed (keyless OIDC), SBOM attached via syft.
#
# Pipeline stages:
#   build  → push each platform by digest (no tag yet)
#   merge  → imagetools create: combine digests into a tagged multi-arch index
#   sign   → cosign sign + syft SBOM attached as in-toto attestation
#   smoke  → pull stack, healthz, cosign verify
#
# Pre-flight (one-time):
#   - GHCR is enabled by default for any GitHub org/user namespace.
#   - Settings → Actions → "Workflow permissions" → "Read and write permissions".

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag (defaults to git ref)"
        required: false
      push:
        description: "Actually push images (false = dry-run build only)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write    # GHCR push
  id-token: write    # cosign keyless OIDC
  attestations: write  # GitHub-native attestations

env:
  REGISTRY: ghcr.io
  # Resolves to "ghcr.io/<repo-owner>" — e.g. ghcr.io/<org>.
  # Set PLYNF_ORG as a repo variable once the dedicated org is ready.
  PLYNF_ORG: ${{ vars.PLYNF_ORG || github.repository_owner }}

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: build each platform and push by content-addressed digest.
  # No tag is applied here — tags are applied in the merge stage after
  # both archs are available, preventing a race that would leave the tag
  # pointing at only one platform.
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.service.name }} (${{ matrix.platform }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: workspace,     context: services/workspace }
          - { name: gateway,       context: services/gateway }
          - { name: identity,      context: services/identity }
          - { name: dashboard,     context: services/dashboard }
          - { name: mock-mcp,      context: mock-mcp-server }
          - { name: github-mcp,    context: mcp-servers/github }
          - { name: slack-mcp,     context: mcp-servers/slack }
          - { name: linear-mcp,    context: mcp-servers/linear }
          - { name: notion-mcp,    context: mcp-servers/notion }
          - { name: google-mcp,    context: mcp-servers/google-workspace }
          - { name: atlassian-mcp, context: mcp-servers/atlassian }
          - { name: salesforce-mcp,context: mcp-servers/salesforce }
          - { name: asana-mcp,     context: mcp-servers/asana }
        platform:
          - linux/amd64
          - linux/arm64
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: meta
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Used as artifact name suffix so each platform's digest is stored
      # separately and can be addressed in the merge stage.
      - name: Platform slug
        id: plat
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          platforms: ${{ matrix.platform }}
          # Never push via the action's own push flag — we control that
          # through outputs so we can use push-by-digest.
          push: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name == 'push' || inputs.push == true }}
          cache-from: type=gha,scope=${{ matrix.service.name }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.service.name }}-${{ matrix.platform }},mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.title=plynf-${{ matrix.service.name }}
            org.opencontainers.image.licenses=Apache-2.0

      # Create a zero-byte file whose name is the digest (sans sha256: prefix).
      # The merge stage reads filenames from /tmp/digests/ to build the
      # imagetools create arguments.
      - name: Export digest
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: ${{ github.event_name == 'push' || inputs.push == true }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.service.name }}-${{ steps.plat.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: merge per-platform digests into a single tagged multi-arch
  # OCI image index. One job per service.
  # ─────────────────────────────────────────────────────────────────────
  merge:
    name: Merge ${{ matrix.service }}
    runs-on: ubuntu-22.04
    needs: build
    if: ${{ github.event_name == 'push' || inputs.push == true }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - workspace
          - gateway
          - identity
          - dashboard
          - mock-mcp
          - github-mcp
          - slack-mcp
          - linear-mcp
          - notion-mcp
          - google-mcp
          - atlassian-mcp
          - salesforce-mcp
          - asana-mcp
    steps:
      # Download both linux-amd64 and linux-arm64 digest files for this
      # service into a flat directory.
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.service }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Globs the digest files, builds a list of image@sha256:<digest>
      # references, and creates a multi-arch manifest list with the
      # versioned + latest tags.
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:${{ needs.build.outputs.version }}" \
            -t "${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:latest" \
            $(printf '${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}@sha256:%s ' *)

      - name: Inspect manifest (sanity check)
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:${{ needs.build.outputs.version }}"

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: sign the merged multi-arch manifest and attach SBOM.
  # Runs after merge so the image at the tag is a complete manifest index.
  # ─────────────────────────────────────────────────────────────────────
  sign-and-sbom:
    name: Sign + SBOM ${{ matrix.service }}
    needs: [build, merge]
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'push' || inputs.push == true }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - workspace
          - gateway
          - identity
          - dashboard
          - mock-mcp
          - github-mcp
          - slack-mcp
          - linear-mcp
          - notion-mcp
          - google-mcp
          - atlassian-mcp
          - salesforce-mcp
          - asana-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: sigstore/cosign-installer@v3

      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:${{ needs.build.outputs.version }}
          format: spdx-json
          artifact-name: plynf-${{ matrix.service }}.spdx.json
          upload-artifact: true

      - name: Log in to GHCR (for cosign)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: cosign sign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          image="${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:${{ needs.build.outputs.version }}"
          # --recursive signs every per-arch digest inside the manifest index.
          cosign sign --yes --recursive "${image}"
          echo "Signed ${image}"

      - name: cosign attest (attach SBOM as in-toto attestation)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          image="${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${{ matrix.service }}:${{ needs.build.outputs.version }}"
          cosign attest --yes --recursive --type spdxjson \
            --predicate "plynf-${{ matrix.service }}.spdx.json" \
            "${image}"

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: pull the full stack, verify healthz endpoints, verify
  # cosign signatures end-to-end.
  # ─────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke-test pulled images
    needs: [build, sign-and-sbom]
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'push' || inputs.push == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull and start stack from compose.prod.yml
        env:
          PLYNF_ORG: ${{ env.PLYNF_ORG }}
          PLYNF_VERSION: ${{ needs.build.outputs.version }}
        run: |
          docker compose -f deploy/compose.prod.yml pull
          docker compose -f deploy/compose.prod.yml up -d --wait --wait-timeout 180

      - name: Verify all 13 services healthy
        run: |
          for port in 7421 7422 7423 7424 7425 7426 7427 7428 7429 7430 7431 7432 7433; do
            curl -sf "http://localhost:${port}/healthz" >/dev/null || {
              echo "✘ port ${port} not healthy"
              docker compose -f deploy/compose.prod.yml logs --tail 50
              exit 1
            }
          done
          echo "✔ All 13 services healthy"

      - name: Verify cosign signatures
        run: |
          cosign version
          for svc in workspace gateway identity dashboard mock-mcp \
                    github-mcp slack-mcp linear-mcp notion-mcp \
                    google-mcp atlassian-mcp salesforce-mcp asana-mcp; do
            cosign verify \
              "${{ env.REGISTRY }}/${{ env.PLYNF_ORG }}/plynf-${svc}:${{ needs.build.outputs.version }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --certificate-identity-regexp "^https://github.com/${{ github.repository_owner }}/.+" \
              >/dev/null || { echo "✘ ${svc} signature invalid"; exit 1; }
          done
          echo "✔ All signatures verified"

      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose.prod.yml down -v
