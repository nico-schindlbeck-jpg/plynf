name: release-cli

# Builds and releases the plynf Go CLI to 6 OS/arch targets.
# Triggered on tag push v*.*.* (same tag scheme as the image pipeline,
# so a single 'git tag v1.7.6 && git push origin v1.7.6' fires both
# release-images.yml and release-cli.yml in parallel).
#
# Outputs:
#   - GitHub Release with 6 archived binaries
#   - SBOM (SPDX) per binary, generated by syft
#   - cosign signature per binary (keyless OIDC)
#   - Homebrew tap PR (plynf/homebrew-tap)
#   - install.sh / install.ps1 sourcing scripts uploaded as release assets

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag"
        required: false

permissions:
  contents: write          # GitHub Release create/edit
  packages: write          # GHCR (if we add image distribution of CLI later)
  id-token: write          # cosign keyless OIDC
  attestations: write      # GitHub-native SLSA attestations

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/cli/go.sum

      - uses: anchore/sbom-action/download-syft@v0
      - uses: sigstore/cosign-installer@v3

      # Skip the Homebrew tap publish if no token is configured.
      # The plynf/homebrew-tap repo + HOMEBREW_TAP_GITHUB_TOKEN secret are
      # needed before this step can succeed.
      - name: Determine goreleaser args
        id: gr_args
        run: |
          args="release --clean"
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]; then
            args="${args} --skip=homebrew"
          fi
          # When the workflow is dispatched with an explicit version input,
          # the resolved tag may not point at the workflow_dispatch commit
          # (e.g. v1.7.6 tag was cut before this very fix landed). Skip
          # goreleaser's tag-HEAD validation in that case — signing, SBOM,
          # and publishing still run normally.
          if [ -n "${INPUT_VERSION}" ]; then
            args="${args} --skip=validate"
          fi
          echo "args=${args}" >> "$GITHUB_OUTPUT"
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Resolve release tag
        id: tag
        run: |
          # Priority 1: explicit workflow_dispatch input (lets us run from
          # main with `-F version=v1.7.6` when the v1.7.6 tag was created
          # before this workflow change landed).
          # Priority 2: a non-pre-release tag pointing at HEAD (picks v1.7.6
          # over v1.7.6-rc14 when both share a commit).
          # Priority 3: github.ref_name (the tag the workflow was triggered on).
          INPUT_VERSION='${{ github.event.inputs.version }}'
          if [ -n "${INPUT_VERSION}" ]; then
            TAG="${INPUT_VERSION}"
          else
            STABLE=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -n "${STABLE}" ]; then
              TAG="${STABLE}"
            else
              TAG="${GITHUB_REF_NAME}"
            fi
          fi
          echo "Resolved release tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.gr_args.outputs.args }}
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with write access to plynf/homebrew-tap repo for the Brew PR
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "true"
          # Force goreleaser to use the resolved tag, so multi-tag commits
          # (v1.7.6 + v1.7.6-rc14 on the same SHA) don't get mis-detected.
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}

      - name: Upload install scripts as release assets
        run: |
          assets=()
          for f in install/install.sh install/install.ps1; do
            [ -f "$f" ] && assets+=("$f")
          done
          if [ ${#assets[@]} -gt 0 ]; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
