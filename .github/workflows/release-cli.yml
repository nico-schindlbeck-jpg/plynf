name: release-cli

# Builds and releases the plynf Go CLI to 6 OS/arch targets.
# Triggered on tag push v*.*.* (same tag scheme as the image pipeline,
# so a single 'git tag v1.7.6 && git push origin v1.7.6' fires both
# release-images.yml and release-cli.yml in parallel).
#
# Outputs:
#   - GitHub Release with 6 archived binaries
#   - SBOM (SPDX) per binary, generated by syft
#   - cosign signature per binary (keyless OIDC)
#   - Homebrew tap PR (plynf/homebrew-tap)
#   - install.sh / install.ps1 sourcing scripts uploaded as release assets

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version tag"
        required: false

permissions:
  contents: write          # GitHub Release create/edit
  packages: write          # GHCR (if we add image distribution of CLI later)
  id-token: write          # cosign keyless OIDC
  attestations: write      # GitHub-native SLSA attestations

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/cli/go.sum

      - uses: anchore/sbom-action/download-syft@v0
      - uses: sigstore/cosign-installer@v3

      # Skip the Homebrew tap publish if no token is configured.
      # The plynf/homebrew-tap repo + HOMEBREW_TAP_GITHUB_TOKEN secret are
      # needed before this step can succeed.
      - name: Determine goreleaser args
        id: gr_args
        run: |
          args="release --clean"
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]; then
            args="${args} --skip=homebrew"
          fi
          echo "args=${args}" >> "$GITHUB_OUTPUT"
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ steps.gr_args.outputs.args }}
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with write access to plynf/homebrew-tap repo for the Brew PR
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "true"

      - name: Upload install scripts as release assets
        run: |
          gh release upload "${GITHUB_REF##*/}" \
            install/install.sh \
            install/install.ps1 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
