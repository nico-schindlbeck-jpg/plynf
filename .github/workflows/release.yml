# SPDX-License-Identifier: Apache-2.0
# Helm chart workflow — packages the Plynf Helm chart and pushes it to
# GHCR as an OCI artifact on every version tag.
#
# Docker image builds are handled by release-images.yml.
# GitHub Release notes are created by release-cli.yml (goreleaser).
# This workflow only owns the Helm chart artifact.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  helm-package:
    name: Package + publish Helm chart
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Lint chart
        run: helm lint deploy/helm/plinth

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/plinth \
            --app-version "${GITHUB_REF_NAME}" \
            --version "${GITHUB_REF_NAME#v}" \
            --destination dist

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" \
              "oci://ghcr.io/${{ github.repository_owner }}/charts"
          done

      - name: Upload chart as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: plynf-helm-chart
          path: dist/*.tgz
          retention-days: 30
