# SPDX-License-Identifier: Apache-2.0
# Plinth — release workflow.
# Builds + pushes multi-arch images to GHCR for every `v*` tag, then cuts a
# GitHub release with auto-generated notes.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: workspace
            context: services/workspace
          - name: gateway
            context: services/gateway
          - name: identity
            context: services/identity
          - name: dashboard
            context: services/dashboard
          - name: mock-mcp
            context: mock-mcp-server
          - name: github-mcp
            context: mcp-servers/github
          - name: slack-mcp
            context: mcp-servers/slack
          - name: linear-mcp
            context: mcp-servers/linear
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=plinth-${{ matrix.service.name }}
            org.opencontainers.image.vendor=Plinth Authors
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: true
          sbom: true

  helm-package:
    name: Package Helm chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Lint chart
        run: helm lint deploy/helm/plinth

      - name: Package chart
        run: |
          mkdir -p dist
          helm package deploy/helm/plinth --destination dist

      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" oci://ghcr.io/${{ github.repository }}/charts
          done

      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: plinth-helm-chart
          path: dist/*.tgz

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-package]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: plinth-helm-chart
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tgz
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
