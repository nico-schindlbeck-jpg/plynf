      time: "06:00"
    labels: ["deps", "docker"]

  - package-ecosystem: "docker"
    directory: "/mcp-servers/slack"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels: ["deps", "docker"]

  - package-ecosystem: "docker"
    directory: "/mcp-servers/linear"
    schedule:
      interval: "weekly"
      day: "monday"
