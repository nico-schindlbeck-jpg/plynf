    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    groups:
      python-dev:
        dependency-type: "development"

  # ───────── Contract tests ─────────
  - package-ecosystem: "pip"
    directory: "/tests/contract"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    groups:
