version: 2

# Notes for reviewers:
# - GitHub Actions: minor + patch only auto-PRed; majors require manual ignore-removal
#   (actions occasionally introduce breaking input changes on majors).
# - Docker Python base image: pinned to 3.11 family — we explicitly ignore 3.12+
#   majors here because Plinth code targets 3.11+ but production images stay on
#   3.11-slim for stability. Lift this when we decide to upgrade.
# - npm major bumps (vitest, prettier, etc): allowed but require human review
#   before merge.

updates:
  # ───────── GitHub Actions ─────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["deps", "ci"]
    ignore:
      # GHA majors require human review; minor + patch only via automation
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ───────── Python services ─────────
  - package-ecosystem: "pip"
    directory: "/services/workspace"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    groups:
      python-dev:
        dependency-type: "development"

  - package-ecosystem: "pip"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    groups:
      python-dev:
        dependency-type: "development"

  - package-ecosystem: "pip"
    directory: "/services/identity"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
