app = "plynf-teams-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3978"
  MICROSOFT_APP_TYPE = "MultiTenant"
  # flyctl secrets set MICROSOFT_APP_ID=… MICROSOFT_APP_PASSWORD=… \
  #     PLYNF_URL=… PLYNF_API_KEY=…

[http_service]
  internal_port = 3978
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
