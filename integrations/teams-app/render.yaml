services:
  - type: web
    name: plynf-teams-bot
    runtime: docker
    repo: https://github.com/nico-schindlbeck-jpg/plynf.git
    rootDir: integrations/teams-app
    dockerfilePath: integrations/teams-app/Dockerfile
    plan: starter
    region: frankfurt
    envVars:
      - key: MICROSOFT_APP_ID
        sync: false
      - key: MICROSOFT_APP_PASSWORD
        sync: false
      - key: MICROSOFT_APP_TYPE
        value: MultiTenant
      - key: PLYNF_URL
        sync: false
      - key: PLYNF_API_KEY
        sync: false
      - key: PLYNF_MODEL
        value: gpt-4o
      - key: PORT
        value: "3978"
