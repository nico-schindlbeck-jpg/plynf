<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <linearGradient id="plynf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8551"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Two stacked planes representing the filter layer between agent + data. -->
  <rect x="6" y="14" width="48" height="14" rx="3" fill="url(#plynf-grad)" opacity="0.85"/>
  <rect x="6" y="32" width="48" height="14" rx="3" fill="url(#plynf-grad)" opacity="0.55"/>
  <!-- "Squeeze" arrows: data narrows between the layers. -->
  <path d="M16 20 L30 26 L44 20" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M16 40 L30 34 L44 40" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>
