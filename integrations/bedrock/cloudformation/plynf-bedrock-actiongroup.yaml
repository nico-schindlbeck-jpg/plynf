AWSTemplateFormatVersion: "2010-09-09"
Description: |
  Plynf — Bedrock Action Group bridge.

  Deploys a Lambda function that forwards Bedrock Agent action-group calls
  to a Plynf proxy (POST /v1/tools/{tool}/invoke), so Bedrock Agents get
  Plynf-shaped tool responses for free. Configure your Bedrock Agent's
  Action Group to invoke this Lambda; the OpenAPI schema generated by
  ``plynf-actiongroup-schema.yaml`` (sibling file) describes the
  supported tools.

  Pre-conditions:
    1. You have a Plynf API key (Free, Pro, or Enterprise tier).
    2. The Plynf proxy is reachable from this Lambda's VPC / egress path.
       For Plynf Cloud, the default outbound internet route is enough.
    3. The API key is stored in AWS Secrets Manager.

Parameters:
  PlynfApiUrl:
    Type: String
    Default: "https://app.plynf.com"
    Description: Base URL of your Plynf proxy. For self-hosted, set to the
      load balancer DNS or internal URL.

  PlynfApiKeySecretArn:
    Type: String
    Description: ARN of the AWS Secrets Manager secret that holds the
      Plynf API key as plain text. (Create with `aws secretsmanager
      create-secret --name plynf/api-key --secret-string sk-...`.)

  LambdaMemoryMB:
    Type: Number
    Default: 256
    AllowedValues: [128, 256, 512, 1024]
    Description: Lambda memory size.

  LambdaTimeoutS:
    Type: Number
    Default: 30
    MinValue: 5
    MaxValue: 60
    Description: Lambda timeout in seconds.

  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 7, 14, 30, 60, 90, 180, 365]

Resources:
  # Execution role with the minimal permissions: read the secret, write logs.
  PlynfBedrockBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PlynfApiKeyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref PlynfApiKeySecretArn

  PlynfBedrockBridge:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "plynf-bedrock-bridge-${AWS::StackName}"
      Description: Forwards Bedrock Agent action-group calls to Plynf.
      Runtime: python3.12
      Handler: index.handler
      MemorySize: !Ref LambdaMemoryMB
      Timeout: !Ref LambdaTimeoutS
      Role: !GetAtt PlynfBedrockBridgeRole.Arn
      Environment:
        Variables:
          PLYNF_API_URL: !Ref PlynfApiUrl
          PLYNF_API_KEY_SECRET_ARN: !Ref PlynfApiKeySecretArn
      Code:
        # Inline so the template deploys without an upload pipeline. For
        # heavy logic, replace with a CodeUri and the SAM CLI.
        ZipFile: |
          # SPDX-License-Identifier: Apache-2.0
          # Plynf Bedrock Action-Group bridge.
          import json
          import os
          import urllib.request
          import urllib.error

          import boto3

          _SECRETS = boto3.client("secretsmanager")
          _CACHED_KEY: dict[str, str] = {}


          def _api_key() -> str:
              if "value" in _CACHED_KEY:
                  return _CACHED_KEY["value"]
              arn = os.environ["PLYNF_API_KEY_SECRET_ARN"]
              resp = _SECRETS.get_secret_value(SecretId=arn)
              v = resp.get("SecretString", "")
              _CACHED_KEY["value"] = v
              return v


          def handler(event, context):
              """Bedrock invokes us with a normalised event:
              {
                "actionGroup": "...",
                "apiPath": "/get_order",
                "httpMethod": "POST",
                "parameters": [],
                "requestBody": {"content": {"application/json": {"properties": [...]}}}
              }
              We translate to POST /v1/tools/<tool>/invoke and return the
              shaped result in Bedrock's expected response envelope.
              """
              api_path = event.get("apiPath", "")
              tool = api_path.lstrip("/")
              if not tool:
                  return _err(event, 400, "missing apiPath")

              # Pull arguments from Bedrock's structured body if present;
              # else fall back to the flat parameters list.
              args: dict = {}
              body = event.get("requestBody", {}).get("content", {}).get(
                  "application/json", {}
              )
              for prop in body.get("properties", []) or []:
                  args[prop["name"]] = prop.get("value")
              for p in event.get("parameters", []) or []:
                  args.setdefault(p["name"], p.get("value"))

              url = (os.environ["PLYNF_API_URL"].rstrip("/")
                     + f"/v1/tools/{tool}/invoke")
              payload = json.dumps({
                  "arguments": args,
                  "agent_id": event.get("agent", {}).get("name"),
              }).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=payload,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {_api_key()}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=25) as r:
                      body_text = r.read().decode("utf-8")
                      return _ok(event, body_text)
              except urllib.error.HTTPError as e:
                  return _err(event, e.code, e.read().decode("utf-8", "replace"))
              except Exception as e:  # noqa: BLE001
                  return _err(event, 500, f"bridge error: {e!s}")


          def _ok(event, body_text):
              return {
                  "messageVersion": "1.0",
                  "response": {
                      "actionGroup": event.get("actionGroup"),
                      "apiPath": event.get("apiPath"),
                      "httpMethod": event.get("httpMethod", "POST"),
                      "httpStatusCode": 200,
                      "responseBody": {
                          "application/json": {"body": body_text}
                      },
                  },
              }


          def _err(event, status, msg):
              return {
                  "messageVersion": "1.0",
                  "response": {
                      "actionGroup": event.get("actionGroup"),
                      "apiPath": event.get("apiPath", "/"),
                      "httpMethod": event.get("httpMethod", "POST"),
                      "httpStatusCode": status,
                      "responseBody": {
                          "application/json": {
                              "body": json.dumps({"error": msg})
                          }
                      },
                  },
              }

  # Allow the Bedrock service to invoke this Lambda. Bedrock attaches
  # action-groups by ARN, so this permission is required.
  BedrockInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PlynfBedrockBridge
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

  PlynfBedrockBridgeLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${PlynfBedrockBridge}"
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  LambdaArn:
    Description: ARN of the Plynf bridge Lambda. Use this in the Bedrock
      Agent Action Group configuration.
    Value: !GetAtt PlynfBedrockBridge.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

  LambdaName:
    Description: Function name (for CLI / console linking).
    Value: !Ref PlynfBedrockBridge
