[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── Installer pipes (200-rewrite so curl|sh works in one hop) ────────
[[redirects]]
  from = "/install.sh"
  to = "https://raw.githubusercontent.com/nico-schindlbeck-jpg/plinth/main/install/install.sh"
  status = 200
  force = true

[[redirects]]
  from = "/install.ps1"
  to = "https://raw.githubusercontent.com/nico-schindlbeck-jpg/plinth/main/install/install.ps1"
  status = 200
  force = true

# ─── GitHub aliases ───────────────────────────────────────────────────
[[redirects]]
  from = "/github"
  to = "https://github.com/nico-schindlbeck-jpg/plinth"
  status = 302

[[redirects]]
  from = "/repo"
  to = "https://github.com/nico-schindlbeck-jpg/plinth"
  status = 302

[[redirects]]
  from = "/releases"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/releases"
  status = 302

[[redirects]]
  from = "/issues"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/issues"
  status = 302

# ─── Subdomain placeholders (point at GitHub until real surfaces exist) ─
[[redirects]]
  from = "/docs"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/tree/main/docs"
  status = 302

# Discord doesn't exist yet — funnel users to GitHub Discussions
# until a real invite is created.
[[redirects]]
  from = "/discord"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/discussions"
  status = 302

# ─── Misc ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/og.jpg"
  to = "/og-image.svg"
  status = 301
