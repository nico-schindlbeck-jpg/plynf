[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── Installer pipes ──────────────────────────────────────────────────
# install.sh is served DIRECTLY from landing/public/install.sh — no
# redirect needed. The previous setup pointed at raw.githubusercontent.com
# which 404s while the repo is private. Source of truth stays in
# install/install.sh; landing/public/install.sh is a deploy-time copy.
#
# install.ps1 doesn't exist yet — when added, place it in public/ same way.
[[headers]]
  for = "/install.sh"
  [headers.values]
    Content-Type = "text/x-shellscript; charset=utf-8"
    Cache-Control = "public, max-age=300, must-revalidate"

# ─── GitHub aliases ───────────────────────────────────────────────────
[[redirects]]
  from = "/github"
  to = "https://github.com/nico-schindlbeck-jpg/plinth"
  status = 302

[[redirects]]
  from = "/repo"
  to = "https://github.com/nico-schindlbeck-jpg/plinth"
  status = 302

[[redirects]]
  from = "/releases"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/releases"
  status = 302

[[redirects]]
  from = "/issues"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/issues"
  status = 302

# ─── Subdomain placeholders (point at GitHub until real surfaces exist) ─
[[redirects]]
  from = "/docs"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/tree/main/docs"
  status = 302

# Discord doesn't exist yet — funnel users to GitHub Discussions
# until a real invite is created.
[[redirects]]
  from = "/discord"
  to = "https://github.com/nico-schindlbeck-jpg/plinth/discussions"
  status = 302

# ─── Misc ─────────────────────────────────────────────────────────────
[[redirects]]
  from = "/og.jpg"
  to = "/og-image.svg"
  status = 301
