[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/install.sh"
  to = "https://raw.githubusercontent.com/nico-schindlbeck-jpg/plinth/main/install/install.sh"
  status = 302

[[redirects]]
  from = "/github"
  to = "https://github.com/nico-schindlbeck-jpg/plinth"
  status = 302

[[redirects]]
  from = "/docs"
  to = "https://docs.plinth.dev"
  status = 302

[[redirects]]
  from = "/discord"
  to = "https://discord.gg/plinth"
  status = 302
