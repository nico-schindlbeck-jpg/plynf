<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plinth Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <a class="brand" href="#/" id="brand-link">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">Plinth</span>
        </a>
        <nav class="topnav" aria-label="primary">
          <a class="topnav-link" href="#/" data-route="overview">Overview</a>
          <a class="topnav-link" href="#/workflows" data-route="workflows">Workflows</a>
          <a class="topnav-link" href="#/studio" data-route="studio">Studio</a>
          <a class="topnav-link" href="#/tenants" data-route="tenants">Tenants</a>
        </nav>
        <span class="crumb" id="crumb"></span>
      </div>
      <div class="topbar-right">
        <span class="meta" id="last-refresh">connecting&hellip;</span>
        <label class="toggle">
          <input type="checkbox" id="autorefresh-toggle" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">auto-refresh <strong>5s</strong></span>
        </label>
        <button class="btn" id="refresh-btn" title="Refresh now">
          <span class="spinner" id="spinner" hidden></span>
          <span id="refresh-label">Refresh</span>
        </button>
      </div>
    </header>

    <main id="view-root">
      <!-- The active view is rendered here by app.js. -->
    </main>

    <!-- Templates ---------------------------------------------------- -->

    <template id="tpl-overview">
      <section class="tiles" id="tiles"></section>

      <section class="card">
        <div class="card-head"><h2>Services</h2></div>
        <ul class="services" id="services"></ul>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Tenants</h2>
          <span class="muted" id="tenants-count"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Tenant ID</th>
                <th class="num">Workspaces</th>
                <th class="num">Tools</th>
                <th class="num">Audit events</th>
              </tr>
            </thead>
            <tbody id="tenants-body">
              <tr class="empty"><td colspan="4">No tenants yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Workspaces</h2>
          <span class="muted" id="workspaces-count"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Tenant</th>
                <th>Created</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="workspaces-body">
              <tr class="empty"><td colspan="5">No workspaces yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card" id="deadletters-card" hidden>
        <div class="card-head">
          <h2>Dead letters</h2>
          <span class="muted" id="deadletters-count"></span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Workspace</th>
                <th>Channel</th>
                <th class="num">Count</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="deadletters-body">
              <tr class="empty"><td colspan="4">No dead letters.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>OTLP status</h2>
          <span class="muted" id="otlp-status-pill"></span>
        </div>
        <div id="otlp-body" class="otlp-status">
          <p class="empty muted">loading&hellip;</p>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Tool calls (last 60 min)</h2>
          <span class="muted" id="timeseries-summary"></span>
        </div>
        <div class="timeseries-wrap">
          <canvas id="timeseries-canvas" width="600" height="180"
            aria-label="Tool calls per minute over the last 60 minutes"></canvas>
        </div>
      </section>

      <!-- v1.0 — time-series tiles (cost / latency / error rate / cache hit ratio).
           Each tile renders a small inline SVG; auto-refreshes via /api/timeseries. -->
      <section class="card">
        <div class="card-head">
          <h2>Time-series (24h rolling)</h2>
          <span class="muted">refresh every 30s</span>
        </div>
        <div class="ts-grid">
          <div class="ts-tile" data-metric="cost">
            <div class="ts-head">
              <span class="ts-title">Cost ($/h)</span>
              <span class="ts-summary" data-summary></span>
            </div>
            <div class="ts-svg" data-svg></div>
          </div>
          <div class="ts-tile" data-metric="latency_p99">
            <div class="ts-head">
              <span class="ts-title">Tool-call latency p99 (ms)</span>
              <span class="ts-summary" data-summary></span>
            </div>
            <div class="ts-svg" data-svg></div>
          </div>
          <div class="ts-tile" data-metric="error_rate">
            <div class="ts-head">
              <span class="ts-title">Error rate (%)</span>
              <span class="ts-summary" data-summary></span>
            </div>
            <div class="ts-svg" data-svg></div>
          </div>
          <div class="ts-tile" data-metric="cache_hit_ratio">
            <div class="ts-head">
              <span class="ts-title">Cache hit ratio (%)</span>
              <span class="ts-summary" data-summary></span>
            </div>
            <div class="ts-svg" data-svg></div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Tool calls</h2>
          <span class="muted">recent 50</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Tool</th>
                <th>Cached</th>
                <th class="num">Duration</th>
                <th class="num">Cost</th>
                <th>Audit ID</th>
              </tr>
            </thead>
            <tbody id="audit-body">
              <tr class="empty"><td colspan="6">No tool calls yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><h2>Cost by tool</h2></div>
        <div class="bars" id="bars">
          <p class="empty muted">No cost data yet.</p>
        </div>
      </section>

      <!-- v1.4 — per-agent cost rollup. -->
      <section class="card">
        <div class="card-head">
          <h2>Cost by agent</h2>
          <span class="muted" id="cost-by-agent-summary">last 24h · refresh every 30s</span>
        </div>
        <div class="table-wrap">
          <table class="data-table cost-by-agent-table">
            <thead>
              <tr>
                <th>Agent</th>
                <th>Tenant</th>
                <th class="num sortable" data-sort="invocations">Invocations</th>
                <th class="num">Cached</th>
                <th class="num sortable" data-sort="avg_duration_ms">Avg dur</th>
                <th class="num sortable" data-sort="total_cost_usd">Cost</th>
                <th>Top tools</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="cost-by-agent-body">
              <tr class="empty"><td colspan="8">No invocations yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- v1.4 — anomalies panel. -->
      <section class="card">
        <div class="card-head">
          <h2>Anomalies</h2>
          <span class="muted" id="anomalies-summary">last 1h · refresh every 30s</span>
        </div>
        <div class="anomalies-list" id="anomalies-list">
          <p class="empty muted">No anomalies detected.</p>
        </div>
      </section>
    </template>

    <template id="tpl-workspace">
      <a class="back-link" href="#/" id="back-link">&larr; Back to overview</a>

      <section class="card workspace-head" id="ws-head">
        <div>
          <h1 id="ws-name">Workspace</h1>
          <p class="muted mono" id="ws-id"></p>
        </div>
        <div class="workspace-meta" id="ws-meta"></div>
      </section>

      <div class="workspace-grid">
        <section class="card">
          <div class="card-head"><h2>KV entries</h2><span class="muted" id="kv-count"></span></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Key</th><th class="num">Version</th><th>Updated</th></tr></thead>
              <tbody id="kv-body"><tr class="empty"><td colspan="3">No keys.</td></tr></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2>Snapshots</h2><span class="muted" id="snap-count"></span></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>ID</th><th>Name</th><th>Created</th></tr></thead>
              <tbody id="snap-body"><tr class="empty"><td colspan="3">No snapshots.</td></tr></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2>Channels</h2><span class="muted" id="channel-count"></span></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Name</th><th class="num">Depth</th><th>Last send</th><th class="actions-col">Actions</th></tr></thead>
              <tbody id="channel-body"><tr class="empty"><td colspan="4">No channels.</td></tr></tbody>
            </table>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2>Workflows</h2><span class="muted" id="wf-count"></span></div>
          <div id="wf-body" class="workflows">
            <p class="empty muted">No workflows.</p>
          </div>
        </section>
      </div>
    </template>

    <template id="tpl-workflows-list">
      <section class="card">
        <div class="card-head">
          <h2>Workflows</h2>
          <span class="muted" id="wf-list-count"></span>
        </div>

        <div class="wf-filters">
          <label class="wf-filter">
            <span class="wf-filter-label">Status</span>
            <select id="wf-filter-status">
              <option value="">all</option>
              <option value="running">running</option>
              <option value="completed">completed</option>
              <option value="failed">failed</option>
              <option value="cancelled">cancelled</option>
              <option value="pending">pending</option>
            </select>
          </label>
          <label class="wf-filter">
            <span class="wf-filter-label">Workspace</span>
            <select id="wf-filter-workspace">
              <option value="">all</option>
            </select>
          </label>
          <span class="muted" id="wf-list-summary"></span>
        </div>

        <div class="table-wrap">
          <table class="data-table wf-list-table">
            <thead>
              <tr>
                <th data-sort="status" class="sortable">Status</th>
                <th>Workspace</th>
                <th>Workflow</th>
                <th class="num">Steps</th>
                <th data-sort="started" class="sortable">Started</th>
                <th class="actions-col">Action</th>
              </tr>
            </thead>
            <tbody id="wf-list-body">
              <tr class="empty"><td colspan="6">No workflows yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </template>

    <template id="tpl-workflow-detail">
      <a class="back-link" href="#/workflows" id="wf-back">&larr; Back to workflows</a>

      <section class="card workflow-detail-head" id="wf-detail-head">
        <div>
          <h1 id="wf-detail-name">Workflow</h1>
          <p class="muted mono" id="wf-detail-id"></p>
        </div>
        <div class="workflow-detail-meta" id="wf-detail-meta"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Steps</h2>
          <span class="muted" id="wf-detail-progress"></span>
        </div>
        <div class="wf-graph-wrap">
          <div class="wf-graph" id="wf-graph" role="list"
               aria-label="Workflow steps in execution order">
            <p class="empty muted">loading&hellip;</p>
          </div>
        </div>
      </section>
    </template>

    <!-- v1.5 — workflow replay (timeline scrubber + per-step state). -->
    <template id="tpl-workflow-replay">
      <a class="back-link" href="#/workflows" id="replay-back">&larr; Back to workflows</a>

      <section class="card workflow-detail-head" id="replay-head">
        <div>
          <h1 id="replay-name">Workflow replay</h1>
          <p class="muted mono" id="replay-id"></p>
        </div>
        <div class="workflow-detail-meta" id="replay-meta"></div>
      </section>

      <section class="card replay-card">
        <div class="card-head">
          <h2>Timeline scrubber</h2>
          <span class="muted" id="replay-scrub-summary">drag to inspect past state</span>
        </div>
        <div class="replay-scrubber">
          <div class="replay-svg-wrap" id="replay-svg-wrap">
            <svg id="replay-svg" viewBox="0 0 800 80" preserveAspectRatio="none"
                 aria-label="workflow timeline scrubber"></svg>
          </div>
          <input type="range" min="0" max="1000" value="1000" step="1"
                 id="replay-range" aria-label="time position" />
          <div class="replay-scrub-meta">
            <span id="replay-pos-time">—</span>
            <button class="btn small" type="button" id="replay-jump-now">Jump to now</button>
            <button class="btn small" type="button" id="replay-restore-to-this">
              Restore workspace to this point
            </button>
          </div>
        </div>
      </section>

      <section class="card replay-card">
        <div class="card-head">
          <h2>Step state at scrub position</h2>
          <span class="muted" id="replay-graph-summary"></span>
        </div>
        <div class="wf-graph-wrap">
          <div class="wf-graph" id="replay-graph" role="list"
               aria-label="Workflow steps at the selected timeline position">
            <p class="empty muted">loading&hellip;</p>
          </div>
        </div>
      </section>

      <section class="card replay-card">
        <div class="card-head">
          <h2>Error attribution</h2>
          <span class="muted" id="replay-errors-summary"></span>
        </div>
        <div id="replay-errors" class="replay-errors">
          <p class="empty muted">No failures in this workflow.</p>
        </div>
      </section>
    </template>

    <!-- v2 — Plinth Studio (visual workflow builder, drag-drop edition). -->
    <template id="tpl-studio-v2">
      <a class="back-link" href="#/" id="studio-back">&larr; Back to overview</a>

      <section class="card studio-head">
        <div>
          <h1>Plinth Studio</h1>
          <p class="muted">Drag a step from the toolbox onto the canvas to compose a workflow. Drag rows to reorder, or drag onto the trash to delete.</p>
        </div>
        <div class="studio-actions">
          <label class="studio-ws-picker">
            <span class="muted">Workspace</span>
            <select id="studio-ws-select" aria-label="target workspace">
              <option value="">— choose —</option>
            </select>
          </label>
          <div class="studio-trash" id="studio-trash"
               role="button"
               tabindex="0"
               aria-label="trash — drop a step here or focus a row and press Delete">
            <span class="studio-trash-icon" aria-hidden="true">🗑</span>
            <span class="studio-trash-label">Trash</span>
          </div>
          <button class="btn small" type="button" id="studio-load">Load</button>
          <button class="btn small" type="button" id="studio-export">Export JSON</button>
          <button class="btn small primary" type="button" id="studio-save">Save</button>
        </div>
      </section>

      <div class="studio-grid">
        <aside class="card studio-toolbox" aria-labelledby="studio-toolbox-h">
          <div class="card-head"><h2 id="studio-toolbox-h">Toolbox</h2></div>
          <p class="studio-toolbox-hint muted" id="studio-toolbox-hint">
            Drag a tile onto the canvas to insert. Keyboard: focus a tile and press Enter to append.
          </p>
          <ul class="studio-tools" id="studio-tools">
            <li><button class="studio-tool"
                       type="button"
                       data-step-type="tool"
                       draggable="true"
                       aria-grabbed="false"
                       aria-describedby="studio-toolbox-hint">
              <span class="studio-tool-name">Tool call</span>
              <span class="studio-tool-desc">Invoke a registered tool via gateway.</span>
            </button></li>
            <li><button class="studio-tool"
                       type="button"
                       data-step-type="llm"
                       draggable="true"
                       aria-grabbed="false"
                       aria-describedby="studio-toolbox-hint">
              <span class="studio-tool-name">LLM call</span>
              <span class="studio-tool-desc">Call client.llm.complete with a model + prompt template.</span>
            </button></li>
            <li><button class="studio-tool"
                       type="button"
                       data-step-type="channel_send"
                       draggable="true"
                       aria-grabbed="false"
                       aria-describedby="studio-toolbox-hint">
              <span class="studio-tool-name">Channel send</span>
              <span class="studio-tool-desc">Post a message to a workspace channel.</span>
            </button></li>
            <li><button class="studio-tool"
                       type="button"
                       data-step-type="channel_receive"
                       draggable="true"
                       aria-grabbed="false"
                       aria-describedby="studio-toolbox-hint">
              <span class="studio-tool-name">Channel receive</span>
              <span class="studio-tool-desc">Wait on a workspace channel.</span>
            </button></li>
            <li><button class="studio-tool"
                       type="button"
                       data-step-type="manual"
                       draggable="true"
                       aria-grabbed="false"
                       aria-describedby="studio-toolbox-hint">
              <span class="studio-tool-name">Manual approval</span>
              <span class="studio-tool-desc">Human-in-loop placeholder (post-v1.5).</span>
            </button></li>
          </ul>
        </aside>

        <section class="card studio-canvas-card">
          <div class="card-head">
            <h2>Canvas</h2>
            <span class="muted" id="studio-canvas-summary">no steps yet</span>
          </div>
          <ol class="studio-canvas" id="studio-canvas"
              aria-label="workflow steps in execution order"
              aria-describedby="studio-canvas-keyboard-hint">
            <li class="studio-canvas-empty muted" data-empty-state>
              Drop a step here to start.
            </li>
          </ol>
          <p class="studio-keyboard-hint muted" id="studio-canvas-keyboard-hint">
            Keyboard: focus a row, use ↑/↓ buttons to reorder, Enter to edit, Delete to remove.
          </p>
          <p class="studio-status muted" id="studio-status"></p>
          <div class="studio-undo-banner"
               id="studio-undo-banner"
               role="status"
               aria-live="polite"
               hidden>
            <span id="studio-undo-text">Step deleted.</span>
            <button class="studio-undo-btn"
                    type="button"
                    id="studio-undo-btn">Undo</button>
            <span class="studio-undo-timer" id="studio-undo-timer">(5s)</span>
          </div>
        </section>

        <aside class="card studio-properties" aria-labelledby="studio-props-h">
          <div class="card-head"><h2 id="studio-props-h">Workflow properties</h2></div>
          <form id="studio-properties-form" class="quotas-form">
            <label class="qf-row">
              <span>name</span>
              <input type="text" name="name" placeholder="research-pipeline"
                     required maxlength="200" />
            </label>
            <label class="qf-row">
              <span>description</span>
              <input type="text" name="description"
                     placeholder="optional one-line description" />
            </label>
            <label class="qf-row">
              <span>retry_policy</span>
              <select name="retry_policy">
                <option value="none">none</option>
                <option value="fixed">fixed</option>
                <option value="exponential" selected>exponential</option>
              </select>
            </label>
            <label class="qf-row">
              <span>max_attempts_default</span>
              <input type="number" min="1" max="100" name="max_attempts_default"
                     value="3" />
            </label>
          </form>
        </aside>
      </div>
    </template>

    <!-- v1.5 — Studio per-step config modal -->
    <div class="dlq-modal" id="studio-step-modal" hidden>
      <div class="dlq-modal-card">
        <div class="dlq-modal-head">
          <h2 id="studio-step-modal-title">Edit step</h2>
          <button class="btn small" id="studio-step-modal-close" type="button">close</button>
        </div>
        <div class="dlq-modal-body">
          <form id="studio-step-form" class="quotas-form">
            <input type="hidden" name="index" />
            <input type="hidden" name="type" />
            <label class="qf-row">
              <span>name</span>
              <input type="text" name="name" placeholder="search" required />
            </label>
            <div id="studio-step-fields"></div>
            <div class="qf-actions">
              <button class="btn small primary" type="submit">Save step</button>
              <button class="btn small" type="button" id="studio-step-delete">Delete</button>
              <span class="muted" id="studio-step-status"></span>
            </div>
          </form>
        </div>
      </div>
    </div>

    <template id="tpl-tenants-list">
      <a class="back-link" href="#/" id="tenants-back">&larr; Back to overview</a>
      <section class="card">
        <div class="card-head">
          <h2>Tenants</h2>
          <div>
            <span class="muted" id="tenants-list-count"></span>
            <button class="btn small" id="tenant-create-btn" type="button">
              Create tenant
            </button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="tenants-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th class="num">Members</th>
                <th class="num">Workspaces</th>
                <th class="num">Cost (24h)</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="tenants-list-body">
              <tr class="empty"><td colspan="6">Loading&hellip;</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </template>

    <template id="tpl-tenant-detail">
      <a class="back-link" href="#/tenants" id="tenant-back">&larr; Back to tenants</a>

      <section class="card workspace-head" id="tenant-head">
        <div>
          <h1 id="tenant-name">Tenant</h1>
          <p class="muted mono" id="tenant-id"></p>
        </div>
        <div class="workspace-meta" id="tenant-meta"></div>
      </section>

      <div class="workspace-grid">
        <section class="card">
          <div class="card-head"><h2>Quotas</h2><span class="muted">editable</span></div>
          <form id="tenant-quotas-form" class="quotas-form">
            <label class="qf-row">
              <span>max_workspaces</span>
              <input type="number" min="0" name="max_workspaces" />
            </label>
            <label class="qf-row">
              <span>max_storage_gb</span>
              <input type="number" min="0" step="0.1" name="max_storage_gb" />
            </label>
            <label class="qf-row">
              <span>max_channels_per_workspace</span>
              <input type="number" min="0" name="max_channels_per_workspace" />
            </label>
            <label class="qf-row">
              <span>max_workflows_per_workspace</span>
              <input type="number" min="0" name="max_workflows_per_workspace" />
            </label>
            <label class="qf-row">
              <span>max_active_tokens</span>
              <input type="number" min="0" name="max_active_tokens" />
            </label>
            <label class="qf-row">
              <span>max_oauth_connections</span>
              <input type="number" min="0" name="max_oauth_connections" />
            </label>
            <label class="qf-row">
              <span>max_cost_usd_day</span>
              <input type="number" min="0" step="0.01" name="max_cost_usd_day" />
            </label>
            <label class="qf-row">
              <span>max_cost_usd_month</span>
              <input type="number" min="0" step="0.01" name="max_cost_usd_month" />
            </label>
            <label class="qf-row">
              <span>max_invocations_per_minute</span>
              <input type="number" min="0" name="max_invocations_per_minute" />
            </label>
            <div class="qf-actions">
              <button class="btn small" type="submit" id="quotas-save">Save</button>
              <button class="btn small" type="button" id="quotas-reset">
                Reset to defaults
              </button>
              <span class="muted" id="quotas-status"></span>
            </div>
          </form>
        </section>

        <section class="card">
          <div class="card-head"><h2>Usage</h2></div>
          <div id="tenant-usage" class="quotas-usage">
            <p class="empty muted">loading&hellip;</p>
          </div>
        </section>

        <section class="card">
          <div class="card-head"><h2>Members</h2></div>
          <ul id="tenant-members" class="members">
            <li class="empty muted">No members yet.</li>
          </ul>
        </section>

        <section class="card">
          <div class="card-head"><h2>Recent audit</h2></div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th><th>Tool</th><th>Cached</th>
                  <th class="num">Duration</th><th class="num">Cost</th>
                </tr>
              </thead>
              <tbody id="tenant-audit-body">
                <tr class="empty"><td colspan="5">No invocations yet.</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <section class="card danger-zone">
        <div class="card-head"><h2>Danger zone</h2></div>
        <button class="btn small danger" id="tenant-delete-btn" type="button">
          Delete tenant
        </button>
        <p class="muted">
          Deletion is hard — review the GDPR export before proceeding.
        </p>
      </section>
    </template>

    <!-- Tenant create modal -->
    <div class="dlq-modal" id="tenant-create-modal" hidden>
      <div class="dlq-modal-card">
        <div class="dlq-modal-head">
          <h2>Create tenant</h2>
          <button class="btn small" id="tenant-create-close" type="button">close</button>
        </div>
        <div class="dlq-modal-body">
          <form id="tenant-create-form">
            <label class="qf-row">
              <span>id</span>
              <input type="text" name="id" placeholder="e.g. acme" required />
            </label>
            <label class="qf-row">
              <span>name</span>
              <input type="text" name="name" placeholder="Acme Inc." required />
            </label>
            <fieldset class="qf-presets">
              <legend>Initial quota preset</legend>
              <label><input type="radio" name="preset" value="default" checked /> default</label>
              <label><input type="radio" name="preset" value="trial" /> trial (10% of default)</label>
              <label><input type="radio" name="preset" value="enterprise" /> enterprise (10x default)</label>
            </fieldset>
            <div class="qf-actions">
              <button class="btn small" type="submit">Create</button>
              <span class="muted" id="tenant-create-status"></span>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Channel schema evolution wizard modal -->
    <div class="dlq-modal" id="schema-wizard-modal" hidden>
      <div class="dlq-modal-card schema-wizard">
        <div class="dlq-modal-head">
          <h2 id="schema-wizard-title">Edit channel schema</h2>
          <button class="btn small" id="schema-wizard-close" type="button">close</button>
        </div>
        <div class="dlq-modal-body">
          <p class="muted" id="schema-wizard-summary"></p>
          <textarea
            id="schema-wizard-editor"
            spellcheck="false"
            rows="14"
            placeholder='{"type": "object", "properties": {...}}'></textarea>
          <p id="schema-wizard-syntax" class="schema-status"></p>
          <div class="qf-actions">
            <button class="btn small" id="schema-check-btn" type="button">
              Check compatibility
            </button>
            <button class="btn small" id="schema-apply-btn" type="button" disabled>
              Apply schema
            </button>
            <button class="btn small" id="schema-replay-all-btn" type="button">
              Replay all DLQ (dry run)
            </button>
            <label class="qf-row inline">
              <span>Purge DLQ older than (s)</span>
              <input type="number" min="0" id="schema-purge-seconds" value="0" />
              <button class="btn small danger" id="schema-purge-btn" type="button">Purge</button>
            </label>
          </div>
          <div id="schema-check-result" class="schema-check-result"></div>
        </div>
      </div>
    </div>

    <!-- Workflow step detail modal (vanilla; opened by app.js) -->
    <div class="wf-step-modal" id="wf-step-modal" hidden>
      <div class="wf-step-modal-card">
        <div class="wf-step-modal-head">
          <h2 id="wf-step-modal-title">Step</h2>
          <button class="btn small" id="wf-step-modal-close" type="button">close</button>
        </div>
        <div id="wf-step-modal-body" class="wf-step-modal-body">
          <p class="empty muted">loading&hellip;</p>
        </div>
      </div>
    </div>

    <!-- Dead-letter detail modal (vanilla; opened by app.js) -->
    <div class="dlq-modal" id="dlq-modal" hidden>
      <div class="dlq-modal-card">
        <div class="dlq-modal-head">
          <h2 id="dlq-modal-title">Dead letters</h2>
          <div class="dlq-modal-actions">
            <button class="btn small" id="dlq-replay-all" type="button">
              Replay all
            </button>
            <button class="btn small danger" id="dlq-purge-old" type="button">
              Purge older than 24h
            </button>
            <button class="btn small" id="dlq-modal-close" type="button">
              close
            </button>
          </div>
        </div>
        <div id="dlq-modal-status" class="dlq-modal-status" hidden></div>
        <div id="dlq-modal-body" class="dlq-modal-body">
          <p class="empty muted">loading&hellip;</p>
        </div>
      </div>
    </div>

    <footer class="foot">
      <span>plinth-dashboard v<span id="dashboard-version">&hellip;</span></span>
      <span class="muted">read-only observability</span>
    </footer>
  </body>
</html>
